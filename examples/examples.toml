# GPUI Examples Metadata
#
# This file defines metadata for all examples in the gpui-ce repository.
# It is used by the documentation website to generate the examples index.
#
# Each example has:
#   - title: Display name
#   - description: Short description (1-2 sentences)
#   - path: Path to the source file relative to the repo root
#   - category: One of "learn", "bench", or "legacy"

# =============================================================================
# Learn Examples - Educational examples for learning GPUI
# =============================================================================

[[examples]]
name = "styling"
title = "Styling"
description = "Shows styling fundamentals including colors, borders, shadows, and automatic dark/light theme support."
path = "examples/learn/styling.rs"
category = "learn"

[[examples]]
name = "layout"
title = "Layout"
description = "Demonstrates flexbox and grid layouts, including alignment, grow/shrink, spans, and common app shell patterns."
path = "examples/learn/layout.rs"
category = "learn"

[[examples]]
name = "text"
title = "Text & Typography"
description = "Covers text styling, alignment, decoration, overflow handling, styled text with inline highlights, and unicode/emoji support."
path = "examples/learn/text.rs"
category = "learn"

[[examples]]
name = "interactive_elements"
title = "Interactive Elements"
description = "Covers mouse interactions including clicks, hover states, drag and drop, and low-level mouse event handling."
path = "examples/learn/interactive_elements.rs"
category = "learn"

[[examples]]
name = "creating_components"
title = "Creating Components"
description = "Covers different component patterns: RenderOnce for stateless components, use_state for element-scoped state, and Render for entity-backed components."
path = "examples/learn/creating_components.rs"
category = "learn"

[[examples]]
name = "animation"
title = "Animation"
description = "Demonstrates animation capabilities including easing functions, transformations (rotate, scale), and repeating animations."
path = "examples/learn/animation.rs"
category = "learn"

[[examples]]
name = "custom_drawing"
title = "Custom Drawing"
description = "Demonstrates the canvas element, PathBuilder for custom shapes, and interactive drawing with mouse events."
path = "examples/learn/custom_drawing.rs"
category = "learn"

[[examples]]
name = "async_tasks"
title = "Async Tasks"
description = "Shows how to spawn async tasks, handle background work, and update the UI from async contexts."
path = "examples/learn/async_tasks.rs"
category = "learn"

